<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .stocks-table {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .stocks-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .stocks-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: left;
            font-weight: 600;
        }
        .stocks-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }
        .stocks-table tr:last-child td {
            border-bottom: none;
        }
        .stocks-table tbody tr:hover {
            background: #f8f9fa;
        }
        .ticker {
            font-weight: 600;
            color: #333;
        }
        .name {
            color: #666;
        }
        .price {
            font-weight: 600;
            color: #667eea;
        }
        .refresh {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stock Prices</h1>
        <div class="stocks-table">
            <table>
                <thead>
                    <tr>
                        <th>Ticker</th>
                        <th>Full Name</th>
                        <th>Latest Price</th>
                    </tr>
                </thead>
                <tbody>
                    {% for stock in stocks %}
                    <tr>
                        <td class="ticker">{{ stock.ticker }}</td>
                        <td class="name">{{ stock.name }}</td>
                        <td class="price">${{ "{:.2f}".format(stock.price) if stock.price != 'N/A' else 'N/A' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <p class="refresh">Data refreshed on page load</p>
    </div>
</body>
</html>
